<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Live captions</title>
  <link rel="icon" href="../favicon.svg" type="image/svg+xml" />
  <script src="https://cdn.ably.com/lib/ably.min-2.js"></script>
  <style>
    :root {
      --bg: #0b0b0c;
      --fg: #f4f4f5;
      --muted: #a1a1aa;
      --accent: #22c55e;
      --warn: #f59e0b;
      --err: #ef4444;
      --font: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    }
    * { box-sizing: border-box; }
    html {
      height: 100%;
    }
    body {
      margin: 0;
      height: 100%;
      max-height: 100dvh;
      overflow: hidden;
      background: var(--bg);
      color: var(--fg);
      font-family: var(--font);
      display: flex;
      flex-direction: column;
    }
    header {
      flex-shrink: 0;
      padding: 0.75rem 1rem;
      border-bottom: 1px solid #27272a;
      font-size: 0.85rem;
      color: var(--muted);
      background: var(--bg);
    }
    .top-bar {
      display: flex;
      align-items: center;
      gap: 0.65rem;
      flex-wrap: wrap;
    }
    #channel-display {
      color: var(--fg);
      font-size: inherit;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    #status {
      color: var(--accent);
      flex: 1 1 auto;
      min-width: 8rem;
    }
    #status.error { color: var(--err); }
    #status.warn { color: var(--warn); }
    #disconnect-btn {
      margin-left: auto;
      background: #3f3f46;
      color: #fafafa;
      flex-shrink: 0;
      padding-block: 0.45rem;
    }
    main {
      flex: 1 1 auto;
      display: flex;
      flex-direction: column;
      padding: 1rem;
      gap: 1rem;
      min-height: 0;
      overflow: hidden;
      background: var(--bg);
    }
    #auth-panel {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      max-width: 40rem;
    }
    label { font-size: 0.8rem; color: var(--muted); }
    input, button, textarea {
      font: inherit;
      border-radius: 8px;
      border: 1px solid #3f3f46;
      background: #18181b;
      color: var(--fg);
      padding: 0.6rem 0.75rem;
    }
    button {
      background: var(--accent);
      color: #052e14;
      font-weight: 600;
      border: none;
      cursor: pointer;
    }
    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    #caption-pane {
      flex: 1 1 0%;
      display: flex;
      flex-direction: column;
      min-height: 0;
      overflow: hidden;
    }
    #history-scroll {
      flex: 1 1 0%;
      min-height: clamp(7rem, 30dvh, 55vh);
      display: flex;
      flex-direction: column;
      overflow-y: auto;
      overflow-x: hidden;
      padding: 0.25rem 0.15rem 0.75rem 0;
      border-bottom: 1px solid #27272a;
      overscroll-behavior: contain;
    }
    #history-lines {
      display: flex;
      flex-direction: column;
      gap: 0.55rem;
      margin-top: auto;
      width: 100%;
      flex-shrink: 0;
    }
    #history-lines p {
      margin: 0;
      font-size: clamp(0.95rem, 3.2vw, 1.2rem);
      color: #d4d4d8;
      line-height: 1.4;
      text-wrap: pretty;
      word-break: break-word;
    }
    #history-lines p.history-note {
      font-size: 0.82rem;
      font-style: italic;
      opacity: 0.85;
    }
    #current-row {
      flex-shrink: 0;
      padding-top: 0.75rem;
    }
    #current {
      font-size: clamp(1.35rem, 6vw, 2.25rem);
      font-weight: 600;
      line-height: 1.3;
      text-wrap: balance;
      min-height: 1.3em;
    }
    #current.partial::after {
      content: "…";
      color: var(--muted);
      font-weight: 400;
    }
    .speaker-prefix {
      color: var(--muted);
      font-weight: 500;
    }
    #auth-panel.subscriber-online {
      display: none;
    }
  </style>
</head>
<body>
  <header>
    <div class="top-bar">
      <code id="channel-display">—</code>
      <div id="status" class="warn">Disconnected — paste subscriber token below</div>
      <button type="button" id="disconnect-btn" hidden>Disconnect</button>
    </div>
  </header>
  <main>
    <div id="auth-panel">
      <div id="channel-row">
        <label for="channel-input">Channel name</label>
        <input
          id="channel-input"
          type="text"
          autocomplete="off"
          autocapitalize="off"
          spellcheck="false"
          placeholder="e.g. captions:… or paste facilitator subscriber URL"
        />
      </div>
      <label for="token-input">Subscriber token (from facilitator)</label>
      <textarea id="token-input" rows="4" autocomplete="off" autocapitalize="off" spellcheck="false" placeholder="Paste token…"></textarea>
      <button type="button" id="connect-btn">Save & connect</button>
    </div>
    <div id="caption-pane">
      <div id="history-scroll" aria-label="Caption scrollback">
        <div id="history-lines"></div>
      </div>
      <div id="current-row">
        <div id="current" aria-live="assertive" class="partial"></div>
      </div>
    </div>
  </main>
  <script>
    const CAPTION_EVENT = "caption";
    const STORAGE_TOKEN = "captions_subscriber_token";
    const STORAGE_CHANNEL = "captions_channel";

    const params = new URLSearchParams(location.search);
    const channelFromQuery = params.get("channel") || "";

    const el = {
      authPanel: document.getElementById("auth-panel"),
      channelRow: document.getElementById("channel-row"),
      channelInput: document.getElementById("channel-input"),
      channelDisplay: document.getElementById("channel-display"),
      status: document.getElementById("status"),
      tokenInput: document.getElementById("token-input"),
      connectBtn: document.getElementById("connect-btn"),
      disconnectBtn: document.getElementById("disconnect-btn"),
      historyScroll: document.getElementById("history-scroll"),
      historyLines: document.getElementById("history-lines"),
      current: document.getElementById("current"),
    };

    const MAX_HISTORY_PARAS = 600;
    const HISTORY_NEAR_BOTTOM_PX = 56;

    function historyPinnedToLatest() {
      const c = el.historyScroll;
      if (c.scrollHeight <= c.clientHeight) {
        return true;
      }
      const slack = c.scrollHeight - (c.scrollTop + c.clientHeight);
      return slack <= HISTORY_NEAR_BOTTOM_PX;
    }

    function scrollHistoryToLatest() {
      const c = el.historyScroll;
      c.scrollTop = c.scrollHeight;
    }

    function trimHistoryIfNeeded() {
      while (el.historyLines.children.length > MAX_HISTORY_PARAS) {
        el.historyLines.removeChild(el.historyLines.firstChild);
      }
    }

    function appendHistoryLine(text, note) {
      const stickIfAdded = historyPinnedToLatest();
      const p = document.createElement("p");
      if (note) {
        p.className = "history-note";
      }
      p.textContent = text;
      el.historyLines.appendChild(p);
      trimHistoryIfNeeded();
      if (stickIfAdded) {
        requestAnimationFrame(() => {
          scrollHistoryToLatest();
        });
      }
    }

    function resetCaptionUi() {
      el.historyLines.innerHTML = "";
      el.current.textContent = "";
      el.current.classList.remove("partial");
    }

    function setSubscriberOnline(online) {
      el.authPanel.classList.toggle("subscriber-online", !!online);
      el.disconnectBtn.hidden = !online;
    }

    let ably = null;

    function setStatus(text, cls) {
      el.status.textContent = text;
      el.status.className = cls || "";
    }

    const MAX_CHANNEL_LEN = 2048;

    function validateAblyChannelName(name) {
      const channel = String(name ?? "").trim();
      if (!channel) {
        throw new Error("Channel name must be non-empty.");
      }
      if (channel.includes("\n") || channel.includes("\r")) {
        throw new Error("Channel name must not contain newline characters.");
      }
      if (channel.startsWith("[") || channel.startsWith(":")) {
        throw new Error("Channel name must not start with '[' or ':'.");
      }
      if (channel.length > MAX_CHANNEL_LEN) {
        throw new Error(`Channel name must be at most ${MAX_CHANNEL_LEN} characters.`);
      }
      const ns = channel.split(":", 1)[0];
      if (ns.includes("*")) {
        throw new Error("Channel namespace (before the first ':') must not contain '*'.");
      }
      return channel;
    }

    function extractChannelFromInput(raw) {
      let s = String(raw ?? "").trim();
      if (!s) {
        return s;
      }
      const lower = s.toLowerCase();
      if (lower.includes("channel=") || lower.includes("channel%3d")) {
        try {
          if (lower.startsWith("http://") || lower.startsWith("https://")) {
            const u = new URL(s);
            const c = u.searchParams.get("channel");
            if (c && c.trim()) {
              return c.trim();
            }
          }
        } catch (_) {
          /* ignore */
        }
        const m = s.match(/[#?&]channel=([^&#]+)/i);
        if (m) {
          return decodeURIComponent(m[1]).trim();
        }
      }
      return s;
    }

    function normalizeCaptionChannel(raw) {
      const s = extractChannelFromInput(raw);
      if (!s) {
        throw new Error("Channel name must be non-empty.");
      }
      return validateAblyChannelName(s);
    }

    /** Raw channel from ?channel= (preferred), typed field when no URL param, or sessionStorage. */
    function currentChannelRaw() {
      const q = channelFromQuery.trim();
      if (q) {
        return q;
      }
      const typed = el.channelInput.value.trim();
      if (typed) {
        return typed;
      }
      return (sessionStorage.getItem(STORAGE_CHANNEL) || "").trim();
    }

    function resolveChannelOrError() {
      const raw = currentChannelRaw();
      if (!raw) {
        return {
          error: channelFromQuery.trim()
            ? "Invalid channel in URL (?channel=)"
            : "Enter channel name—or paste subscriber URL—including channel=… fragment",
          channel: "",
        };
      }
      try {
        return { error: null, channel: normalizeCaptionChannel(raw) };
      } catch (e) {
        return { error: e.message || String(e), channel: "" };
      }
    }

    function defaultOfflineStatus() {
      if (channelFromQuery.trim()) {
        return "Disconnected — paste subscriber token below";
      }
      return "Disconnected — enter channel and subscriber token below";
    }

    const ANSI_CSI_RE = /\x1b\[[0-?]*[ -/]*[@-~]/g;
    const ANSI_OSC_RE = /\x1b\][^\x07\x1b]*(?:\x07|\x1b\\)/g;

    /** Match `pulse_captions.normalize_whisper_stdout_line` (whisper TTY stdout). */
    function collapseRedundantPrefixRepeat(s, minPrefix) {
      let t = s;
      while (t.length >= minPrefix * 2) {
        let cut = null;
        for (let i = minPrefix; i < t.length; i++) {
          const prefix = t.slice(0, i);
          const rest = t.slice(i);
          if (rest.startsWith(prefix)) {
            cut = i;
            break;
          }
        }
        if (cut == null) {
          break;
        }
        t = t.slice(cut);
      }
      return t;
    }

    function normalizeWhisperStdoutLine(raw, minDupPrefix = 4) {
      let s = String(raw ?? "").replace(ANSI_OSC_RE, "").replace(ANSI_CSI_RE, "");
      if (s.includes("\r")) {
        const parts = s.split("\r");
        s = parts[parts.length - 1] ?? "";
      }
      s = collapseRedundantPrefixRepeat(s.trim(), minDupPrefix);
      return s.trim();
    }

    function captionPayload(raw) {
      if (raw == null) {
        return {};
      }
      if (typeof raw === "string") {
        try {
          return JSON.parse(raw);
        } catch (_) {
          return { text: raw, kind: "partial" };
        }
      }
      return typeof raw === "object" ? raw : {};
    }

    function captionMessageKind(data) {
      const k = data && data.kind;
      return String(k ?? "").trim().toLowerCase() === "final" ? "final" : "partial";
    }

    function speakerLabel(data) {
      const sp = data && data.speaker;
      if (!sp || typeof sp !== "object") return "";
      const name = String(sp.name ?? "").trim();
      if (name) return name;
      return String(sp.id ?? "").trim();
    }

    function formatSpeakerLine(label, text) {
      const body = String(text ?? "").trim();
      const name = String(label ?? "").trim();
      if (!name) return body;
      if (!body) return name + ":";
      return name + ": " + body;
    }

    function setCurrentCaption(text, label) {
      el.current.textContent = "";
      el.current.classList.add("partial");
      const line = String(text ?? "").trim();
      if (!line) return;
      const colon = line.indexOf(": ");
      if (colon >= 0) {
        const prefix = document.createElement("span");
        prefix.className = "speaker-prefix";
        prefix.textContent = line.slice(0, colon + 1) + " ";
        el.current.appendChild(prefix);
        el.current.appendChild(document.createTextNode(line.slice(colon + 2)));
        return;
      }
      el.current.textContent = line;
    }

    function appendSpeakerHistoryLine(label, text) {
      const line = String(text ?? "").trim();
      if (!line) return;
      const colon = line.indexOf(": ");
      if (colon >= 0) {
        const p = document.createElement("p");
        const prefix = document.createElement("span");
        prefix.className = "speaker-prefix";
        prefix.textContent = line.slice(0, colon + 1) + " ";
        p.appendChild(prefix);
        p.appendChild(document.createTextNode(line.slice(colon + 2)));
        const stickIfAdded = historyPinnedToLatest();
        el.historyLines.appendChild(p);
        trimHistoryIfNeeded();
        if (stickIfAdded) {
          requestAnimationFrame(() => {
            scrollHistoryToLatest();
          });
        }
        return;
      }
      appendHistoryLine(line, false);
    }

    function captionedText(data) {
      const raw = normalizeWhisperStdoutLine((data && data.text) || "");
      const label = speakerLabel(data);
      if (!label) return raw;
      const prefix = label + ": ";
      if (raw.startsWith(prefix)) return raw;
      return formatSpeakerLine(label, raw);
    }

    function applyCaption(msg) {
      const rawPayload = msg && Object.prototype.hasOwnProperty.call(msg, "data") ? msg.data : msg;
      const data = captionPayload(rawPayload);
      if (data && data.ended === true) {
        setStatus("Session ended by host", "warn");
        appendHistoryLine("Session ended by host", true);
        el.current.textContent = "";
        el.current.classList.remove("partial");
        return;
      }
      const kind = captionMessageKind(data);
      const label = speakerLabel(data);
      const text = captionedText(data);
      if (kind === "final") {
        let historyLine = text;
        if (!historyLine) {
          const fromLive = normalizeWhisperStdoutLine(el.current.textContent);
          if (fromLive) {
            historyLine = fromLive;
          }
        }
        if (historyLine) {
          appendSpeakerHistoryLine(label, historyLine);
        }
        el.current.textContent = "";
        el.current.classList.remove("partial");
      } else {
        setCurrentCaption(text, label);
      }
    }

    function connectWithToken(token) {
      const { error, channel: ch } = resolveChannelOrError();
      if (error) {
        setStatus(error, "error");
        setSubscriberOnline(false);
        return;
      }
      if (ably) {
        ably.close();
        ably = null;
      }
      resetCaptionUi();
      el.channelDisplay.textContent = ch;
      sessionStorage.setItem(STORAGE_CHANNEL, ch);
      setStatus("Connecting…", "warn");
      try {
        ably = new Ably.Realtime({ token: token.trim() });
        setSubscriberOnline(true);
        const chRef = ably.channels.get(ch);

        let captionsSubscribed = false;

        function refreshListeningStatus() {
          if (!ably || ably.connection.state !== "connected") {
            return;
          }
          setStatus(
            "Listening · channel " + chRef.state + " · event \"" + CAPTION_EVENT + "\"",
            ""
          );
        }

        function ensureCaptionSubscription() {
          if (!ably || ably.connection.state !== "connected") {
            return;
          }
          if (captionsSubscribed) {
            refreshListeningStatus();
            return;
          }
          captionsSubscribed = true;
          chRef
            .subscribe(CAPTION_EVENT, applyCaption)
            .then(() => refreshListeningStatus())
            .catch((err) => {
              captionsSubscribed = false;
              const msg = err && err.message ? err.message : String(err);
              setStatus("Subscribe / attach failed: " + msg, "error");
              console.error("[captions-relay subscriber]", err);
            });
        }

        chRef.on("failed", () => setStatus("Channel failed", "error"));
        chRef.on("attached", () => refreshListeningStatus());

        ably.connection.on("connected", () => {
          if (!captionsSubscribed) {
            setStatus("Realtime connected — subscribing…", "warn");
          }
          ensureCaptionSubscription();
        });
        ably.connection.on("disconnected", () => {
          if (!ably) {
            return;
          }
          setStatus("Reconnecting…", "warn");
        });
        ably.connection.on("failed", () => setStatus("Connection failed", "error"));
        ably.connection.on("suspended", () => setStatus("Suspended (retrying…)", "warn"));

        if (ably.connection.state === "connected") {
          ensureCaptionSubscription();
        }
      } catch (e) {
        ably = null;
        setSubscriberOnline(false);
        setStatus(String(e.message || e), "error");
      }
    }

    el.connectBtn.addEventListener("click", () => {
      const token = el.tokenInput.value.trim();
      if (!token) {
        setStatus("Paste subscriber token first", "error");
        return;
      }
      sessionStorage.setItem(STORAGE_TOKEN, token);
      connectWithToken(token);
    });

    el.disconnectBtn.addEventListener("click", () => {
      sessionStorage.removeItem(STORAGE_TOKEN);
      sessionStorage.removeItem(STORAGE_CHANNEL);
      el.tokenInput.value = "";
      if (!channelFromQuery.trim()) {
        el.channelInput.value = "";
      }
      if (ably) {
        ably.close();
      }
      ably = null;
      resetCaptionUi();
      setSubscriberOnline(false);
      setStatus(defaultOfflineStatus(), "warn");
    });

    (function init() {
      if (channelFromQuery.trim()) {
        el.channelRow.hidden = true;
      } else {
        el.channelRow.hidden = false;
        el.channelInput.value = sessionStorage.getItem(STORAGE_CHANNEL) || "";
      }

      const { error, channel: ch } = resolveChannelOrError();
      el.channelDisplay.textContent = ch || "—";
      setSubscriberOnline(false);
      setStatus(defaultOfflineStatus(), "warn");
      if (error && channelFromQuery.trim()) {
        setStatus(error, "error");
      }
      const saved = sessionStorage.getItem(STORAGE_TOKEN);
      if (saved) {
        el.tokenInput.value = saved;
        if (!error && ch) {
          connectWithToken(saved);
        }
      }
    })();
  </script>
</body>
</html>
