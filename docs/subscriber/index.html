<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Live captions</title>
  <link rel="icon" href="../favicon.svg" type="image/svg+xml" />
  <script src="https://cdn.ably.com/lib/ably.min-2.js"></script>
  <style>
    :root {
      --bg: #0b0b0c;
      --fg: #f4f4f5;
      --muted: #a1a1aa;
      --accent: #22c55e;
      --warn: #f59e0b;
      --err: #ef4444;
      --font: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100dvh;
      background: var(--bg);
      color: var(--fg);
      font-family: var(--font);
      display: flex;
      flex-direction: column;
    }
    header {
      padding: 0.75rem 1rem;
      border-bottom: 1px solid #27272a;
      font-size: 0.85rem;
      color: var(--muted);
    }
    #status {
      color: var(--accent);
    }
    #status.error { color: var(--err); }
    #status.warn { color: var(--warn); }
    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 1rem;
      gap: 1rem;
    }
    #auth-panel {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      max-width: 40rem;
    }
    label { font-size: 0.8rem; color: var(--muted); }
    input, button, textarea {
      font: inherit;
      border-radius: 8px;
      border: 1px solid #3f3f46;
      background: #18181b;
      color: var(--fg);
      padding: 0.6rem 0.75rem;
    }
    button {
      background: var(--accent);
      color: #052e14;
      font-weight: 600;
      border: none;
      cursor: pointer;
    }
    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    #caption-pane {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      min-height: 40vh;
    }
    #previous {
      font-size: clamp(1rem, 3.5vw, 1.25rem);
      color: var(--muted);
      line-height: 1.35;
      min-height: 2.5em;
    }
    #current {
      font-size: clamp(1.35rem, 6vw, 2.25rem);
      font-weight: 600;
      line-height: 1.3;
      text-wrap: balance;
    }
    #current.partial::after {
      content: "…";
      color: var(--muted);
      font-weight: 400;
    }
    footer {
      font-size: 0.75rem;
      color: var(--muted);
      padding: 0.5rem 1rem;
    }
  </style>
</head>
<body>
  <header>
    <div>Channel: <code id="channel-display">—</code></div>
    <div id="status" class="warn">Disconnected — paste subscriber token below</div>
  </header>
  <main>
    <div id="auth-panel">
      <label for="token-input">Subscriber token (from facilitator)</label>
      <textarea id="token-input" rows="4" autocomplete="off" autocapitalize="off" spellcheck="false" placeholder="Paste token…"></textarea>
      <button type="button" id="connect-btn">Save & connect</button>
      <button type="button" id="clear-btn" style="background:#3f3f46;color:#fafafa;">Clear saved token</button>
    </div>
    <div id="caption-pane">
      <div id="previous" aria-live="polite"></div>
      <div id="current" aria-live="assertive" class="partial"></div>
    </div>
  </main>
  <footer>captions-relay · Ably subscriber</footer>
  <script>
    const CAPTION_EVENT = "caption";
    const STORAGE_TOKEN = "captions_subscriber_token";
    const STORAGE_CHANNEL = "captions_channel";

    const params = new URLSearchParams(location.search);
    const channelFromQuery = params.get("channel") || "";

    const el = {
      channelDisplay: document.getElementById("channel-display"),
      status: document.getElementById("status"),
      tokenInput: document.getElementById("token-input"),
      connectBtn: document.getElementById("connect-btn"),
      clearBtn: document.getElementById("clear-btn"),
      previous: document.getElementById("previous"),
      current: document.getElementById("current"),
    };

    let ably = null;

    function setStatus(text, cls) {
      el.status.textContent = text;
      el.status.className = cls || "";
    }

    const MAX_CHANNEL_LEN = 2048;

    function validateAblyChannelName(name) {
      const channel = String(name ?? "").trim();
      if (!channel) {
        throw new Error("Channel name must be non-empty.");
      }
      if (channel.includes("\n") || channel.includes("\r")) {
        throw new Error("Channel name must not contain newline characters.");
      }
      if (channel.startsWith("[") || channel.startsWith(":")) {
        throw new Error("Channel name must not start with '[' or ':'.");
      }
      if (channel.length > MAX_CHANNEL_LEN) {
        throw new Error(`Channel name must be at most ${MAX_CHANNEL_LEN} characters.`);
      }
      const ns = channel.split(":", 1)[0];
      if (ns.includes("*")) {
        throw new Error("Channel namespace (before the first ':') must not contain '*'.");
      }
      return channel;
    }

    function extractChannelFromInput(raw) {
      let s = String(raw ?? "").trim();
      if (!s) {
        return s;
      }
      const lower = s.toLowerCase();
      if (lower.includes("channel=") || lower.includes("channel%3d")) {
        try {
          if (lower.startsWith("http://") || lower.startsWith("https://")) {
            const u = new URL(s);
            const c = u.searchParams.get("channel");
            if (c && c.trim()) {
              return c.trim();
            }
          }
        } catch (_) {
          /* ignore */
        }
        const m = s.match(/[#?&]channel=([^&#]+)/i);
        if (m) {
          return decodeURIComponent(m[1]).trim();
        }
      }
      return s;
    }

    function normalizeCaptionChannel(raw) {
      const s = extractChannelFromInput(raw);
      if (!s) {
        throw new Error("Channel name must be non-empty.");
      }
      return validateAblyChannelName(s);
    }

    /** Raw channel from ?channel= query (preferred) or last saved sessionStorage. */
    function currentChannelRaw() {
      const q = channelFromQuery.trim();
      if (q) {
        return q;
      }
      return (sessionStorage.getItem(STORAGE_CHANNEL) || "").trim();
    }

    function resolveChannelOrError() {
      const raw = currentChannelRaw();
      if (!raw) {
        return { error: "Missing ?channel=… in URL", channel: "" };
      }
      try {
        return { error: null, channel: normalizeCaptionChannel(raw) };
      } catch (e) {
        return { error: e.message || String(e), channel: "" };
      }
    }

    const ANSI_CSI_RE = /\x1b\[[0-?]*[ -/]*[@-~]/g;
    const ANSI_OSC_RE = /\x1b\][^\x07\x1b]*(?:\x07|\x1b\\)/g;

    /** Match `pulse_captions.normalize_whisper_stdout_line` (whisper TTY stdout). */
    function collapseRedundantPrefixRepeat(s, minPrefix) {
      let t = s;
      while (t.length >= minPrefix * 2) {
        let cut = null;
        for (let i = minPrefix; i < t.length; i++) {
          const prefix = t.slice(0, i);
          const rest = t.slice(i);
          if (rest.startsWith(prefix)) {
            cut = i;
            break;
          }
        }
        if (cut == null) {
          break;
        }
        t = t.slice(cut);
      }
      return t;
    }

    function normalizeWhisperStdoutLine(raw, minDupPrefix = 4) {
      let s = String(raw ?? "").replace(ANSI_OSC_RE, "").replace(ANSI_CSI_RE, "");
      if (s.includes("\r")) {
        const parts = s.split("\r");
        s = parts[parts.length - 1] ?? "";
      }
      s = collapseRedundantPrefixRepeat(s.trim(), minDupPrefix);
      return s.trim();
    }

    function captionPayload(raw) {
      if (raw == null) {
        return {};
      }
      if (typeof raw === "string") {
        try {
          return JSON.parse(raw);
        } catch (_) {
          return { text: raw, kind: "partial" };
        }
      }
      return typeof raw === "object" ? raw : {};
    }

    function applyCaption(msg) {
      const data = captionPayload(msg.data);
      if (data && data.ended === true) {
        setStatus("Session ended by host", "warn");
        el.current.textContent = "";
        el.current.classList.remove("partial");
        return;
      }
      const raw = (data && data.text) || "";
      const text = normalizeWhisperStdoutLine(raw);
      const kind = (data && data.kind) === "final" ? "final" : "partial";
      if (kind === "final") {
        if (el.current.textContent) {
          el.previous.textContent = el.current.textContent;
        }
        el.current.textContent = text;
        el.current.classList.remove("partial");
      } else {
        el.current.textContent = text;
        el.current.classList.add("partial");
      }
    }

    function connectWithToken(token) {
      const { error, channel: ch } = resolveChannelOrError();
      if (error) {
        setStatus(error, "error");
        return;
      }
      if (ably) {
        ably.close();
        ably = null;
      }
      el.channelDisplay.textContent = ch;
      sessionStorage.setItem(STORAGE_CHANNEL, ch);
      setStatus("Connecting…", "warn");
      try {
        ably = new Ably.Realtime({ token: token.trim() });
        const chRef = ably.channels.get(ch);

        function startListening() {
          chRef
            .subscribe(CAPTION_EVENT, applyCaption)
            .then(() =>
              setStatus("Listening · channel " + chRef.state + " · event \"" + CAPTION_EVENT + "\"", "")
            )
            .catch((err) => {
              const msg = err && err.message ? err.message : String(err);
              setStatus("Subscribe / attach failed: " + msg, "error");
              console.error("[captions-relay subscriber]", err);
            });
        }

        chRef.on("failed", () => setStatus("Channel failed", "error"));

        ably.connection.on("disconnected", () => setStatus("Disconnected", "warn"));
        ably.connection.on("failed", () => setStatus("Connection failed", "error"));
        ably.connection.on("suspended", () => setStatus("Suspended (retrying…)", "warn"));

        if (ably.connection.state === "connected") {
          setStatus("Realtime connected…", "warn");
          startListening();
        } else {
          ably.connection.once("connected", () => {
            setStatus("Realtime connected — subscribing…", "warn");
            startListening();
          });
        }
      } catch (e) {
        setStatus(String(e.message || e), "error");
      }
    }

    el.connectBtn.addEventListener("click", () => {
      const token = el.tokenInput.value.trim();
      if (!token) {
        setStatus("Paste subscriber token first", "error");
        return;
      }
      sessionStorage.setItem(STORAGE_TOKEN, token);
      connectWithToken(token);
    });

    el.clearBtn.addEventListener("click", () => {
      sessionStorage.removeItem(STORAGE_TOKEN);
      sessionStorage.removeItem(STORAGE_CHANNEL);
      el.tokenInput.value = "";
      if (ably) {
        ably.close();
      }
      ably = null;
      setStatus("Cleared — paste token to reconnect", "warn");
    });

    (function init() {
      const { error, channel: ch } = resolveChannelOrError();
      el.channelDisplay.textContent = ch || "— (add ?channel= to URL)";
      if (error && channelFromQuery.trim()) {
        setStatus(error, "error");
      }
      const saved = sessionStorage.getItem(STORAGE_TOKEN);
      if (saved) {
        el.tokenInput.value = saved;
        if (!error && ch) {
          connectWithToken(saved);
        }
      }
    })();
  </script>
</body>
</html>
